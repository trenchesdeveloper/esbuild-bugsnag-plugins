name: Publish

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read
  id-token: write # required for npm Trusted Publishing (OIDC) + provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun run test

      - name: Build
        run: bun run build

      - name: Verify tag matches package.json version
        run: |
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          if [ "${PKG_VERSION}" != "${GITHUB_REF_NAME}" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} does not match package.json version ${PKG_VERSION}"
            exit 1
          fi
          echo "Publishing ${PKG_VERSION}"

      - name: Ensure npm supports Trusted Publishing
        run: npm install -g npm@latest # Trusted Publishing requires npm >= 11.5.1

      - name: Publish to npm (Trusted Publishing via OIDC)
        # No NPM_TOKEN: auth comes from the GitHub Actions OIDC id-token, matched
        # against the trusted publisher configured in the npm registry metadata.
        # Provenance is generated automatically for trusted-publisher releases.
        run: npm publish --access public
